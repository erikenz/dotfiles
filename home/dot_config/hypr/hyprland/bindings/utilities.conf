# Menus
# bindd = SUPER, ESCAPE, Power menu, exec, omarchy-menu system
# bindd = SUPER ALT, SPACE, Omarchy menu, exec, omarchy-menu
# bindd = SUPER, K, Show key bindings, exec, omarchy-menu-keybindings
# bindld = , XF86PowerOff, Power menu, exec, omarchy-menu system
bindd = SUPER, SPACE, Launch apps, global, caelestia:launcher
bindd = SUPER CTRL, E, Emoji picker, exec, pkill fuzzel || caelestia emoji -p
bindd = SUPER, ESCAPE, Power menu, global, caelestia:session
bindld = , XF86PowerOff, Power menu, global, caelestia:session

# Brightness
binddl = , XF86MonBrightnessUp, Increase brightness, global, caelestia:brightnessUp
binddl = , XF86MonBrightnessDown, Decrease brightness, global, caelestia:brightnessDown

# Lock
bindd = SUPER, O, Lock screen, global, caelestia:lock
# ── Restore lock ────────────────────────────────────────────────────────
binddl = SUPER ALT, O, Restore lock, exec, caelestia shell -d
binddl = SUPER ALT, O, Restore lock, global, caelestia:lock

# Suspend
bindd = SUPER CTRL SHIFT, O, Suspend then hibernate, exec, systemctl suspend-then-hibernate
bindd = SUPER SHIFT, O, Suspend, exec, systemctl suspend

# Aesthetics
# bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, pkill -SIGUSR1 waybar
# bindd = SUPER CTRL, SPACE, Next background in theme, exec, omarchy-theme-bg-next
# bindd = SUPER SHIFT CTRL, SPACE, Pick new theme, exec, omarchy-menu theme

# Notifications
# bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
# bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, makoctl mode -t do-not-disturb && makoctl mode | grep -q 'do-not-disturb' && notify-send "Silenced notifications" || notify-send "Enabled notifications"
bindd = SUPER CTRL, X, Dismiss all notifications, global, caelestia:clearNotifs

# Toggle idling
bindd = SUPER CTRL, I, Toggle locking on idle, exec, $hyprland/scripts/toggle-idle.fish

# Toggle nightlight
bindd = SUPER CTRL, N, Toggle nightlight, exec, $hyprland/scripts/toggle-nightlight.fish

# Screenshots
bindd = , PRINT, Screenshot of region, exec, $hyprland/scripts/screenshot.fish
bindd = SHIFT, PRINT, Screenshot of window, exec, $hyprland/scripts/screenshot.fish window
bindd = CTRL, PRINT, Screenshot of display, exec, $hyprland/scripts/screenshot.fish output
# bindl = , Print, exec, caelestia screenshot  # Full screen capture > clipboard
# bind = SUPER SHIFT, S, global, caelestia:screenshotFreeze  # Capture region (freeze)
# bind = SUPER ALT SHIFT, S, global, caelestia:screenshot  # Capture region

# Screen recordings
bindd = ALT, PRINT, Screen record a region, exec, $hyprland/scripts/screenrecord.fish
bindd = CTRL ALT, PRINT, Screen record display, exec, $hyprland/scripts/screenrecord.fish output
# bind = Super+Alt, R, exec, caelestia record -s  # Record screen with sound
# bind = Ctrl+Alt, R, exec, caelestia record  # Record screen
# bind = Super+Shift+Alt, R, exec, caelestia record -r  # Record region

# Color picker
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# Clipboard
bind = SUPER, V, exec, pkill fuzzel || caelestia clipboard
bind = SUPER ALT, V, exec, pkill fuzzel || caelestia clipboard -d
bindl = CTRL ALT SHIFT, V, exec, sleep 0.5s && ydotool type -d 1 "$(cliphist list | head -1 | cliphist decode)"  # Alternate paste

# Kill/restart
bindr = SUPER CTRL SHIFT, R, exec, qs -c $qsConfig kill
bindr = SUPER ALT CTRL, R, exec, qs -c $qsConfig kill; qs -c $qsConfig -d

# ╭───────────────────────────────────────────────────────────╮
# │                       Mouse Control                       │
# ╰───────────────────────────────────────────────────────────╯
# $movecursor = $hypr/scripts/move-cursor.fish
$offset = 20
bindd = SUPER CTRL SHIFT, Y, Enter mouse control mode, submap, mousecontrol
submap = mousecontrol
# FIXME: this doesn't currentyl change the cursor state when hovering over a link
# bindde = , H, Move mouse left, exec, $movecursor -$offset 0 # Left
# bindde = , L, Move mouse right, exec, $movecursor $offset 0 # Right
# bindde = , K, Move mouse up, exec, $movecursor 0 -$offset # Up
# bindde = , J, Move mouse down, exec, $movecursor 0 $offset # Down
# binddse = Control_L, H&J, Move mouse left-down, exec, $movecursor -$offset $offset # Left-Down
# binddse = Control_L, L&K, Move mouse right-up, exec, $movecursor $offset -$offset # Right-Up
# binddse = Control_L, H&K, Move mouse left-up, exec, $movecursor -$offset -$offset # Left-Up
# binddse = Control_L, L&J, Move mouse right-down, exec, $movecursor $offset $offset # Right-Down
bindde = , H, Move mouse left, exec, ydotool mousemove -- -$offset 0 && sleep 0.1
bindde = , L, Move mouse right, exec, ydotool mousemove -- $offset 0 && sleep 0.1
bindde = , K, Move mouse up, exec, ydotool mousemove -- 0 -$offset && sleep 0.1
bindde = , J, Move mouse down, exec, ydotool mousemove -- 0 $offset && sleep 0.1
binddse = Control_L, H&J, Move mouse left-down, exec, ydotool mousemove -- -$offset $offset && sleep 0.1
binddse = Control_L, L&K, Move mouse right-up, exec, ydotool mousemove -- $offset -$offset && sleep 0.1
binddse = Control_L, H&K, Move mouse left-up, exec, ydotool mousemove -- -$offset -$offset && sleep 0.1
binddse = Control_L, L&J, Move mouse right-down, exec, ydotool mousemove -- $offset $offset && sleep 0.1
binddr = , A, Left click, sendshortcut, , mouse:272,
binddr = , S, Middle click, sendshortcut, , mouse:274,
binddr = , D, Right click, sendshortcut, , mouse:273,
bind = , Escape, submap, global
submap = global

