# Close windows
bindd = SUPER, W, Close active window, killactive,
bindd = CTRL ALT, DELETE, Close all Windows, exec, omarchy-cmd-close-all-windows

# Control tiling
# bindd = SUPER, J, Toggle split, togglesplit, # dwindle
bindd = SUPER, P, Pseudo window, pseudo, # dwindle
bindd = SUPER, V, Toggle floating, togglefloating,
bindd = SHIFT, F11, Force full screen, fullscreen, 0

# Move focus with SUPER + arrow keys
bindd = SUPER, left, Move focus left, movefocus, l
bindd = SUPER, right, Move focus right, movefocus, r
bindd = SUPER, up, Move focus up, movefocus, u
bindd = SUPER, down, Move focus down, movefocus, d
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, L, Move focus right, movefocus, r
bindd = SUPER, K, Move focus up, movefocus, u
bindd = SUPER, J, Move focus down, movefocus, d

# Switch workspaces with SUPER + [0-9]
bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10
# bindd = SUPER, 1, Switch to workspace 1, exec, $wsaction workspace 1
# bindd = SUPER, 2, Switch to workspace 2, exec, $wsaction workspace 2
# bindd = SUPER, 3, Switch to workspace 3, exec, $wsaction workspace 3
# bindd = SUPER, 4, Switch to workspace 4, exec, $wsaction workspace 4
# bindd = SUPER, 5, Switch to workspace 5, exec, $wsaction workspace 5
# bindd = SUPER, 6, Switch to workspace 6, exec, $wsaction workspace 6
# bindd = SUPER, 7, Switch to workspace 7, exec, $wsaction workspace 7
# bindd = SUPER, 8, Switch to workspace 8, exec, $wsaction workspace 8
# bindd = SUPER, 9, Switch to workspace 9, exec, $wsaction workspace 9
# bindd = SUPER, 0, Switch to workspace 10, exec, $wsaction workspace 10

# Move active window to a workspace with SUPER + SHIFT + [0-9]
bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10
# bind = Super+Alt, 1, exec, $wsaction movetoworkspace 1
# bind = Super+Alt, 2, exec, $wsaction movetoworkspace 2
# bind = Super+Alt, 3, exec, $wsaction movetoworkspace 3
# bind = Super+Alt, 4, exec, $wsaction movetoworkspace 4
# bind = Super+Alt, 5, exec, $wsaction movetoworkspace 5
# bind = Super+Alt, 6, exec, $wsaction movetoworkspace 6
# bind = Super+Alt, 7, exec, $wsaction movetoworkspace 7
# bind = Super+Alt, 8, exec, $wsaction movetoworkspace 8
# bind = Super+Alt, 9, exec, $wsaction movetoworkspace 9
# bind = Super+Alt, 0, exec, $wsaction movetoworkspace 10

# Tab between workspaces
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys / hjkl
bindd = SUPER SHIFT, left, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, right, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, up, Swap window up, swapwindow, u
bindd = SUPER SHIFT, down, Swap window down, swapwindow, d
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

# Cycle through applications on active workspace
bindd = ALT, Tab, Cycle to next window, cyclenext
bindd = ALT SHIFT, Tab, Cycle to prev window, cyclenext, prev
bindd = ALT, Tab, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, Tab, Reveal active window on top, bringactivetotop

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# Scroll through existing workspaces with SUPER + scroll
bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow



# ╭───────────────────────────────────────────────────────────╮
# │                        Workspaces                         │
# ╰───────────────────────────────────────────────────────────╯
$wsaction = $hypr/scripts/wsaction.fish

# ── Go to workspace group # ─────────────────────────────────────────────
# bind = $kbGoToWsGroup, 1, exec, $wsaction -g workspace 1
# bind = $kbGoToWsGroup, 2, exec, $wsaction -g workspace 2
# bind = $kbGoToWsGroup, 3, exec, $wsaction -g workspace 3
# bind = $kbGoToWsGroup, 4, exec, $wsaction -g workspace 4
# bind = $kbGoToWsGroup, 5, exec, $wsaction -g workspace 5
# bind = $kbGoToWsGroup, 6, exec, $wsaction -g workspace 6
# bind = $kbGoToWsGroup, 7, exec, $wsaction -g workspace 7
# bind = $kbGoToWsGroup, 8, exec, $wsaction -g workspace 8
# bind = $kbGoToWsGroup, 9, exec, $wsaction -g workspace 9
# bind = $kbGoToWsGroup, 0, exec, $wsaction -g workspace 10

# ── Go to workspace -1/+1 ───────────────────────────────────────────────
bind = Super, mouse_down, workspace, -1
bind = Super, mouse_up, workspace, +1
binde = $kbPrevWs, workspace, -1
binde = $kbNextWs, workspace, +1
binde = Super, Page_Up, workspace, -1
binde = Super, Page_Down, workspace, +1

# ── Go to workspace group -1/+1 ─────────────────────────────────────────
bind = Ctrl+Super, mouse_down, workspace, -10
bind = Ctrl+Super, mouse_up, workspace, +10


# ── Move window to workspace group # ────────────────────────────────────
bind = Ctrl+Super+Alt, 1, exec, $wsaction -g movetoworkspace 1
bind = Ctrl+Super+Alt, 2, exec, $wsaction -g movetoworkspace 2
bind = Ctrl+Super+Alt, 3, exec, $wsaction -g movetoworkspace 3
bind = Ctrl+Super+Alt, 4, exec, $wsaction -g movetoworkspace 4
bind = Ctrl+Super+Alt, 5, exec, $wsaction -g movetoworkspace 5
bind = Ctrl+Super+Alt, 6, exec, $wsaction -g movetoworkspace 6
bind = Ctrl+Super+Alt, 7, exec, $wsaction -g movetoworkspace 7
bind = Ctrl+Super+Alt, 8, exec, $wsaction -g movetoworkspace 8
bind = Ctrl+Super+Alt, 9, exec, $wsaction -g movetoworkspace 9
bind = Ctrl+Super+Alt, 0, exec, $wsaction -g movetoworkspace 10

# ── Move window to workspace -1/+1 ──────────────────────────────────────
binde = Super+Alt, Page_Up, movetoworkspace, -1
binde = Super+Alt, Page_Down, movetoworkspace, +1
bind = Super+Alt, mouse_down, movetoworkspace, -1
bind = Super+Alt, mouse_up, movetoworkspace, +1
# binde = Ctrl+Super+Shift, right, movetoworkspace, +1
# binde = Ctrl+Super+Shift, left, movetoworkspace, -1
binde = SUPER CTRL SHIFT, L, movetoworkspace, +1
binde = SUPER CTRL SHIFT, H, movetoworkspace, -1

# ── Move window to/from special workspace ───────────────────────────────
# bind = Ctrl+Super+Shift, up, movetoworkspace, special:special
# bind = Ctrl+Super+Shift, down, movetoworkspace, e+0
bind = SUPER CTRL SHIFT, K, movetoworkspace, special:special
bind = SUPER CTRL SHIFT, J, movetoworkspace, e+0
bind = Super+Alt, S, movetoworkspace, special:special

# ── Previous workspace ──────────────────────────────────────────────────
bindd = Super, Slash, Switch to the previous workspace, workspace, previous

# ── Tab between workspaces ──────────────────────────────────────────────
# bindd = SUPER, TAB, Next workspace, workspace, e+1
# bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER, Tab, Focus next monitor, focusmonitor, +1
bindd = SUPER SHIFT, Tab, Focus previous monitor, focusmonitor, -1

# Cycle through applications on active workspace
bindd = ALT, Tab, Cycle to next window, cyclenext
bindd = ALT SHIFT, Tab, Cycle to prev window, cyclenext, prev
bindd = ALT, Tab, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, Tab, Reveal active window on top, bringactivetotop


# ╭───────────────────────────────────────────────────────────╮
# │                          Windows                          │
# ╰───────────────────────────────────────────────────────────╯
# ── Window groups ───────────────────────────────────────────────────────
binde = Alt, Tab, cyclenext, activewindow
binde = Ctrl+Alt, Tab, changegroupactive, f
bind = Super, Comma, togglegroup
bind = Super+Shift, Comma, lockactivegroup, toggle
# ── Window actions ──────────────────────────────────────────────────────
# bind = Super, left, movefocus, l
# bind = Super, right, movefocus, r
# bind = Super, up, movefocus, u
# bind = Super, down, movefocus, d
bind = Super, H, movefocus, l
bind = Super, L, movefocus, r
bind = Super, K, movefocus, u
bind = Super, J, movefocus, d
# bind = Super+Shift, left, movewindow, l
# bind = Super+Shift, right, movewindow, r
# bind = Super+Shift, up, movewindow, u
# bind = Super+Shift, down, movewindow, d
bind = Super+Shift, H, movewindow, l
bind = Super+Shift, L, movewindow, r
bind = Super+Shift, K, movewindow, u
bind = Super+Shift, J, movewindow, d
binde = Super, Minus, splitratio, -0.1
binde = Super, Equal, splitratio, 0.1
bindm = Super, mouse:272, movewindow
bindm = Super, Z, movewindow
bindm = Super, mouse:273, resizewindow
bindm = Super, X, resizewindow
bind = Ctrl+Super, Backslash, centerwindow, 1
bind = Ctrl+Super+Alt, Backslash, resizeactive, exact 55% 70%
bind = Ctrl+Super+Alt, Backslash, centerwindow, 1
bind = $kbWindowPip, exec, caelestia resizer pip  # Move window to picture-in-picture mode
bind = Super, P, pin
bind = Super, F, fullscreen, 0
bind = Super+Alt, F, fullscreen, 1  # Fullscreen with borders
bind = Super+Alt, Space, togglefloating,
bind = Super, Q, killactive,
