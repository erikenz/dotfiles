$wsaction = $hyprland/scripts/wsaction.fish

# Close windows
bindd = SUPER, Q, Close active window, killactive,
bindd = CTRL ALT, DELETE, Close all Windows, exec, omarchy-cmd-close-all-windows

# Control tiling
bindd = SUPER, I, Toggle split, togglesplit, # dwindle
bindd = SUPER, P, Pseudo window, pseudo, # dwindle
bindd = SUPER ALT, SPACE, Toggle floating, togglefloating,
bindd = SHIFT, F11, Force full screen, fullscreen, 0

# Move focus with SUPER + arrow keys / hjkl
bindd = SUPER, left, Move focus left, movefocus, l
bindd = SUPER, right, Move focus right, movefocus, r
bindd = SUPER, up, Move focus up, movefocus, u
bindd = SUPER, down, Move focus down, movefocus, d
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, L, Move focus right, movefocus, r
bindd = SUPER, K, Move focus up, movefocus, u
bindd = SUPER, J, Move focus down, movefocus, d

# Switch workspaces with SUPER + [0-9]
bindd = SUPER, code:10, Switch to workspace 1, exec, $wsaction workspace 1
bindd = SUPER, code:11, Switch to workspace 2, exec, $wsaction workspace 2
bindd = SUPER, code:12, Switch to workspace 3, exec, $wsaction workspace 3
bindd = SUPER, code:13, Switch to workspace 4, exec, $wsaction workspace 4
bindd = SUPER, code:14, Switch to workspace 5, exec, $wsaction workspace 5
bindd = SUPER, code:15, Switch to workspace 6, exec, $wsaction workspace 6
bindd = SUPER, code:16, Switch to workspace 7, exec, $wsaction workspace 7
bindd = SUPER, code:17, Switch to workspace 8, exec, $wsaction workspace 8
bindd = SUPER, code:18, Switch to workspace 9, exec, $wsaction workspace 9
bindd = SUPER, code:19, Switch to workspace 10, exec, $wsaction workspace 10

# Move active window to a workspace with SUPER + SHIFT + [0-9]
bindd = SUPER SHIFT, code:10, Move window to workspace 1, exec, $wsaction movetoworkspace 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, exec, $wsaction movetoworkspace 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, exec, $wsaction movetoworkspace 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, exec, $wsaction movetoworkspace 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, exec, $wsaction movetoworkspace 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, exec, $wsaction movetoworkspace 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, exec, $wsaction movetoworkspace 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, exec, $wsaction movetoworkspace 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, exec, $wsaction movetoworkspace 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, exec, $wsaction movetoworkspace 10

# Go to workspace group #
bindd = SUPER CTRL, 1, Switch to workspace group 1, exec, $wsaction -g workspace 1
bindd = SUPER CTRL, 2, Switch to workspace group 2, exec, $wsaction -g workspace 2
bindd = SUPER CTRL, 3, Switch to workspace group 3, exec, $wsaction -g workspace 3
bindd = SUPER CTRL, 4, Switch to workspace group 4, exec, $wsaction -g workspace 4
bindd = SUPER CTRL, 5, Switch to workspace group 5, exec, $wsaction -g workspace 5
bindd = SUPER CTRL, 6, Switch to workspace group 6, exec, $wsaction -g workspace 6
bindd = SUPER CTRL, 7, Switch to workspace group 7, exec, $wsaction -g workspace 7
bindd = SUPER CTRL, 8, Switch to workspace group 8, exec, $wsaction -g workspace 8
bindd = SUPER CTRL, 9, Switch to workspace group 9, exec, $wsaction -g workspace 9
bindd = SUPER CTRL, 0, Switch to workspace group 10, exec, $wsaction -g workspace 10

# Move window to workspace group #
bindd = SUPER ALT CTRL, 1, Move window to workspace group 1, exec, $wsaction -g movetoworkspace 1
bindd = SUPER ALT CTRL, 2, Move window to workspace group 2, exec, $wsaction -g movetoworkspace 2
bindd = SUPER ALT CTRL, 3, Move window to workspace group 3, exec, $wsaction -g movetoworkspace 3
bindd = SUPER ALT CTRL, 4, Move window to workspace group 4, exec, $wsaction -g movetoworkspace 4
bindd = SUPER ALT CTRL, 5, Move window to workspace group 5, exec, $wsaction -g movetoworkspace 5
bindd = SUPER ALT CTRL, 6, Move window to workspace group 6, exec, $wsaction -g movetoworkspace 6
bindd = SUPER ALT CTRL, 7, Move window to workspace group 7, exec, $wsaction -g movetoworkspace 7
bindd = SUPER ALT CTRL, 8, Move window to workspace group 8, exec, $wsaction -g movetoworkspace 8
bindd = SUPER ALT CTRL, 9, Move window to workspace group 9, exec, $wsaction -g movetoworkspace 9
bindd = SUPER ALT CTRL, 0, Move window to workspace group 10, exec, $wsaction -g movetoworkspace 10

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys / hjkl
bindd = SUPER SHIFT, left, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, right, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, up, Swap window up, swapwindow, u
bindd = SUPER SHIFT, down, Swap window down, swapwindow, d
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

# Move window to/from special workspace
bindd = SUPER CTRL SHIFT, up, Move window to special workspace, movetoworkspace, special:special
bindd = SUPER CTRL SHIFT, down, Remove window from special workspace, movetoworkspace, e+0
bindd = SUPER CTRL SHIFT, K, Move window to special workspace, movetoworkspace, special:special
bindd = SUPER CTRL SHIFT, J, Remove window from special workspace, movetoworkspace, e+0
bindd = SUPER ALT, S, Move window to special workspace, movetoworkspace, special:special

# Window groups
binde = CTRL ALT, Tab, changegroupactive, f
binde = CTRL ALT SHIFT, Tab, changegroupactive, b
bindd = SUPER, COMMA, Toggle group, togglegroup
bindd = SUPER, U, Ungroup window, moveoutofgroup
bindd = SUPER SHIFT, COMMA, Lock active group, lockactivegroup, toggle

# Cycle through applications on active workspace
# binde = ALT SHIFT, TAB, cyclenext, activewindow
# binde = ALT, TAB, cyclenext, prev, activewindow
bindd = ALT, Tab, Cycle to next window, cyclenext
bindd = ALT SHIFT, Tab, Cycle to prev window, cyclenext, prev
bindd = ALT, Tab, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, Tab, Reveal active window on top, bringactivetotop

# Window actions
bindd = SUPER CTRL, Backslash, Center window, centerwindow, 1
bindd = SUPER ALT CTRL, Backslash, Resize and center window, resizeactive, exact 55% 70%
bindd = SUPER ALT CTRL, Backslash, Resize and center window, centerwindow, 1
bindd = SUPER ALT, BACKSLASH, Move window to picture-in-picture mode, exec, caelestia resizer pip
bindd = SUPER, P, Pin window, pin
bindd = SUPER, F, Fullscreen window, fullscreen, 0
bindd = SUPER ALT, F, Fullscreen with borders, fullscreen, 1

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# Tab between workspaces
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1

# Tab between monitors
bindd = SUPER ALT, Tab, Focus next monitor, focusmonitor, +1
bindd = SUPER ALT SHIFT, Tab, Focus previous monitor, focusmonitor, -1

# Switch to previous workspace
bindd = SUPER, SLASH, Switch to the previous workspace, workspace, previous

# Scroll through existing workspaces with SUPER + scroll
bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# Go to workspace -1/+1
bindde = SUPER, PAGE_UP, Workspace -1, workspace, -1
bindde = SUPER, PAGE_DOWN, Workspace +1, workspace, +1

# Go to workspace group -1/+1
bind = SUPER CTRL, mouse_down, workspace, -10
bind = SUPER CTRL, mouse_up, workspace, +10

bindde = SUPER CTRL, left, Workspace -1, workspace, -1
bindde = SUPER CTRL, right, Workspace +1, workspace, +1
bindde = SUPER CTRL, H, Workspace -1, workspace, -1
bindde = SUPER CTRL, L, Workspace +1, workspace, +1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Move window to workspace -1/+1
bindde = SUPER ALT, PAGE_UP, Move window to previous workspace, movetoworkspace, -1
bindde = SUPER ALT, PAGE_DOWN, Move window to next workspace, movetoworkspace, +1
bindd = SUPER ALT, mouse_down, Move window to previous workspace, movetoworkspace, -1
bindd = SUPER ALT, mouse_up, Move window to next workspace, movetoworkspace, +1
binde = SUPER CTRL SHIFT, right, movetoworkspace, +1
binde = SUPER CTRL SHIFT, left, movetoworkspace, -1
bindde = SUPER CTRL SHIFT, H, Move window to previous workspace, movetoworkspace, -1
bindde = SUPER CTRL SHIFT, L, Move window to next workspace, movetoworkspace, +1


# ╭───────────────────────────────────────────────────────────╮
# │                        Workspaces                         │
