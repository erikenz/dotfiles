# See https://wiki.hyprland.org/Configuring/Binds/

exec = hyprctl dispatch submap global
submap = global

# ╭───────────────────────────────────────────────────────────╮
# │                         Launcher                          │
# ╰───────────────────────────────────────────────────────────╯
# WARNING: These absolutely need to be on top, or they won't work consistently
# bindi = SUPER, Super_L, global, $qsConfig:launcher
# bindin = SUPER, catchall, global, $qsConfig:launcherInterrupt
# bindin = SUPER, mouse:272, global, $qsConfig:launcherInterrupt
# bindin = SUPER, mouse:273, global, $qsConfig:launcherInterrupt
# bindin = SUPER, mouse:274, global, $qsConfig:launcherInterrupt
# bindin = SUPER, mouse:275, global, $qsConfig:launcherInterrupt
# bindin = SUPER, mouse:276, global, $qsConfig:launcherInterrupt
# bindin = SUPER, mouse:277, global, $qsConfig:launcherInterrupt
# bindin = SUPER, mouse_up, global, $qsConfig:launcherInterrupt
# bindin = SUPER, mouse_down, global, $qsConfig:launcherInterrupt

# Special workspaces
bindd = SUPER, S, Toggle special workspace, exec, caelestia toggle specialws
bindd = SUPER, M, Toggle music workspace, exec, caelestia toggle music
bindd = SUPER, D, Toggle communication workspace, exec, caelestia toggle communication
bindd = SUPER, T, Toggle todo workspace, exec, caelestia toggle todo
bindd = CTRL SHIFT, ESCAPE, Toggle system monitor workspace, exec, caelestia toggle sysmon

# Application bindings
# $terminal = uwsm app -- alacritty
$terminal = app2unit -- ghostty
$browser = omarchy-launch-browser

bindd = SUPER, C, Code editor, exec, app2unit -- zeditor
bindd = SUPER, RETURN, Terminal, exec, $terminal
bindd = SUPER, E, File explorer, exec, app2unit -- dolphin
bindd = SUPER, W, Browser, exec, app2unit -- vivaldi
bindd = SUPER SHIFT, W, Browser (secondary), exec, app2unit -- zen-browser
bindd = SUPER, N, Neovim, exec, $terminal -e nvim
bindd = SUPER SHIFT, N, Notes (obsidian-nvim), exec, $terminal -e nvim ~/obsidian-vault
bindd = SUPER SHIFT, D, Docker, exec, $terminal -e lazydocker
bindd = SUPER, G, Lazygit, exec, $terminal -e lazygit
bindd = SUPER, X, Audio config, exec, app2unit -- pavucontrol
# bindd = Ctrl+Alt, V, exec, app2unit -- pavucontrol
# bindd = SUPER, T, Activity, exec, $terminal -e btop
# bindd = SUPER, slash, Passwords, exec, uwsm app -- 1password
# bindd = SUPER, return, Terminal, exec, $terminal --working-directory=$(omarchy-cmd-terminal-cwd)
# bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window
# bind = SUPER ALT, E, exec, app2unit -- thunar
# bind = Ctrl+Alt, Escape, exec, app2unit -- qps
# bind = Ctrl+Alt, Escape, exec, app2unit -- missioncenter

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
$launch_webapp = $hyprland/scripts/launch-webapp.sh
bindd = SUPER ALT, C, Calendar, exec, $launch_webapp "https://calendar.google.com/calendar/u/0/r"
bindd = SUPER, Y, YouTube, exec, $launch_webapp "https://youtube.com/"
bindd = SUPER SHIFT, G, WhatsApp, exec, $launch_webapp "https://web.whatsapp.com/"
bindd = SUPER ALT, M, Email, exec, $launch_webapp "https://mail.google.com/mail/u/0/"
# bindd = SUPER, A, ChatGPT, exec, $launch_webapp "https://chatgpt.com"
# bindd = SUPER SHIFT, A, Grok, exec, $launch_webapp "https://grok.com"
# bindd = SUPER ALT, G, Google Messages, exec, omarchy-launch-webapp "https://messages.google.com/web/conversations"
# bindd = SUPER, X, X, exec, $launch_webapp "https://x.com/"
# bindd = SUPER SHIFT, X, X Post, exec, $launch_webapp "https://x.com/compose/post"


source = $hyprland/bindings/utilities.conf
source = $hyprland/bindings/tiling.conf
source = $hyprland/bindings/media.conf
